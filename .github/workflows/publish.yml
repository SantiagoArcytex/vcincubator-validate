name: Publish to npm

# Publishes @vcincubator/validate to npm whenever a GitHub Release is published.
# This keeps the npm "latest" version in sync with the GitHub latest release.
#
# Auth: npm Trusted Publishing (OIDC) — there is NO token or secret to manage.
# One-time setup on npmjs.com:
#   Package @vcincubator/validate → Settings → Trusted Publisher → Add publisher:
#     Provider:           GitHub Actions
#     Organization/user:  SantiagoArcytex
#     Repository:         vcincubator-validate
#     Workflow filename:  publish.yml

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing (and provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 20 ships npm 10.
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json version matches the release tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json: $PKG_VERSION   release tag: $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG_VERSION). Bump package.json before tagging the release."
            exit 1
          fi

      - name: Publish
        # Trusted publishing authenticates via OIDC — no token needed.
        # npm publish runs prepublishOnly first (build + 44 tests); a failure aborts the publish.
        # Provenance attestation is attached automatically when publishing via a trusted publisher.
        run: npm publish --access public
