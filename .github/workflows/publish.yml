name: Publish to npm

# Publishes @vcincubator/validate to npm whenever a GitHub Release is published.
# This keeps the npm "latest" version in sync with the GitHub latest release.
#
# One-time setup: add an npm token as the repo secret NPM_TOKEN
#   npmjs.com → Access Tokens → Generate New Token → "Automation"
#   GitHub → repo Settings → Secrets and variables → Actions → New secret: NPM_TOKEN

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json version matches the release tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json: $PKG_VERSION   release tag: $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG_VERSION). Bump package.json before tagging the release."
            exit 1
          fi

      - name: Publish
        # npm publish runs prepublishOnly first (build + 44 tests); a failure aborts the publish.
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
